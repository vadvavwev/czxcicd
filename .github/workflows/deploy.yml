# GitHub Actions 自动化部署到阿里云ECS
# 本地构建方案：GitHub Actions + 阿里云ECS (ECS本地构建镜像)

name: Deploy Backend

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 部署到阿里云ECS (本地构建)
      - name: Deploy to Alibaba Cloud ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_ECS_HOST }}
          port: ${{ secrets.ALIYUN_ECS_PORT }}
          username: ${{ secrets.ALIYUN_ECS_USER }}
          password: ${{ secrets.ALIYUN_ECS_PASSWORD }}
          script: |
            cd /tmp
            rm -rf enterprise-assistant-backend || true
            git clone https://github.com/vadvavwev/-.git enterprise-assistant-backend
            cd enterprise-assistant-backend/backend
            docker build -t enterprise-assistant-backend:latest .
            docker stop enterprise-assistant-backend || true
            docker rm enterprise-assistant-backend || true
            docker run -d \
              --name enterprise-assistant-backend \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -p 5000:5000 \
              --restart unless-stopped \
              enterprise-assistant-backend:latest

      # 2. 健康检查
      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.ALIYUN_ECS_HOST }}:5000/api/health || {
            echo "Health check failed"
            exit 1
          }
          echo "Deployment successful!"